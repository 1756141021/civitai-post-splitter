<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Civitai · Pixiv Uploader — Mono</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
  /* Stage: full viewport */
  #stage {
    position: fixed; inset: 0;
    background: #0a0a0a;
  }
  /* Canvas: fixed 1280x800; absolutely centered AND scaled in one transform.
     translate(-50%,-50%) handles centering post-transform so the (large) layout
     box never overflows the viewport. */
  #canvas {
    position: absolute;
    top: 50%; left: 50%;
    width: 1280px; height: 800px;
    transform: translate(-50%, -50%) scale(var(--s, 1));
    transform-origin: center center;
    background: #fafaf7;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
    overflow: hidden;
  }
  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="stage"><div id="canvas"><div id="root"></div></div></div>

<script>
  // Auto-fit: scale 1280x800 to viewport, contain (letterbox), no upscale beyond 1.
  (function () {
    const W = 1280, H = 800;
    const canvas = document.getElementById('canvas');
    function fit() {
      const sw = window.innerWidth, sh = window.innerHeight;
      const s = Math.min(sw / W, sh / H);
      canvas.style.setProperty('--s', s);
    }
    fit();
    window.addEventListener('resize', fit);
  })();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
/* ============================================================
   shared: tokens, icons, mock data, primitives, stylesheet
   ============================================================ */
const M = {
  bg: '#fafaf7', bg2: '#f3f2ed', panel: '#ffffff',
  ink: '#171513', ink2: '#3a3733', inkDim: '#6b6660', inkFaint: '#a39d95',
  line: '#e6e3dc', lineSoft: '#efece5',
  accent: '#e2552b', accentSoft: '#fde9df',
  ok: '#2f7d3a', warn: '#a36a00', red: '#b13b2c',
  display: 'Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
  mono: '"IBM Plex Mono", "JetBrains Mono", ui-monospace, monospace',
};

function MIcon({ name, size = 16, color = "currentColor" }) {
  const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "split":   return <svg {...p}><path d="M6 3v6a3 3 0 0 0 3 3h6a3 3 0 0 1 3 3v6"/><path d="M3 6l3-3 3 3"/><path d="M15 18l3 3 3-3"/></svg>;
    case "upload":  return <svg {...p}><path d="M12 15V3"/><path d="M7 8l5-5 5 5"/><path d="M3 17v2a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3v-2"/></svg>;
    case "image":   return <svg {...p}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>;
    case "shield":  return <svg {...p}><path d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6l8-3z"/><path d="M9 12l2 2 4-4"/></svg>;
    case "refresh": return <svg {...p}><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 21v-5h5"/></svg>;
    case "play":    return <svg {...p}><path d="M6 4l14 8-14 8z"/></svg>;
    case "pause":   return <svg {...p}><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>;
    case "stop":    return <svg {...p}><rect x="5" y="5" width="14" height="14" rx="2"/></svg>;
    case "x":       return <svg {...p}><path d="M6 6l12 12M18 6L6 18"/></svg>;
    case "folder":  return <svg {...p}><path d="M3 6a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>;
    default: return null;
  }
}

const MOCK_TASKS = [];
const MOCK_LOG = [];

function MonoChannel({ label, pct, accent }) {
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
        <span style={{ fontSize: 11.5, fontWeight: 600, color: M.ink, letterSpacing: '.06em', textTransform: 'uppercase' }}>{label}</span>
        <span className="mn-mono mn-num" style={{ fontSize: 12, color: accent ? M.accent : M.ink }}>{pct.toFixed(1)}%</span>
      </div>
      <div className={`mn-progress ${accent ? 'accent' : ''}`}><div style={{ width: pct + '%' }} /></div>
    </div>
  );
}

function MonoTaskRow({ t }) {
  const sm = {
    running: { c: M.accent,   label: 'RUN',  cls: 'accent', dot: true },
    queued:  { c: M.inkFaint, label: 'WAIT', cls: 'idle' },
    done:    { c: M.ok,       label: 'DONE', cls: 'done' },
    failed:  { c: M.red,      label: 'FAIL', cls: 'fail' },
  };
  const s = sm[t.status] || sm.queued;
  return (
    <tr className="mn-row-hover">
      <td style={{ padding: '14px 12px', borderBottom: `1px solid ${M.lineSoft}`, width: 60 }}>
        <span className="mn-mono" style={{ fontSize: 10, color: s.c, fontWeight: 600, letterSpacing: '.08em', display: 'inline-flex', alignItems: 'center', gap: 5 }}>
          {s.dot && <span className="ms-pulse" style={{ width: 6, height: 6, borderRadius: '50%', background: s.c }} />}
          {s.label}
        </span>
      </td>
      <td style={{ padding: '14px 12px', borderBottom: `1px solid ${M.lineSoft}` }}>
        <span className="mn-mono" style={{ fontSize: 13, color: M.ink }}>{t.title}</span>
      </td>
      <td style={{ padding: '14px 12px', borderBottom: `1px solid ${M.lineSoft}`, fontSize: 12.5, color: M.inkDim }}>{t.target}</td>
      <td style={{ padding: '14px 12px', borderBottom: `1px solid ${M.lineSoft}`, width: 220 }}>
        <div className={`mn-progress ${s.cls}`}><div style={{ width: `${t.progress * 100}%` }} /></div>
      </td>
      <td style={{ padding: '14px 12px', borderBottom: `1px solid ${M.lineSoft}`, fontFamily: M.mono, fontSize: 12, color: M.ink2 }}>{t.count}</td>
      <td style={{ padding: '14px 12px', borderBottom: `1px solid ${M.lineSoft}`, fontFamily: M.mono, fontSize: 12, color: M.inkFaint, width: 70 }}>{t.eta}</td>
      <td style={{ padding: '14px 12px', borderBottom: `1px solid ${M.lineSoft}`, textAlign: 'right', width: 90 }}>
        <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
          {t.status === 'running' && <button className="mn-btn mn-btn-ghost" style={{ padding: '5px 7px' }}><MIcon name="pause" size={12} /></button>}
          {t.status === 'queued'  && <button className="mn-btn mn-btn-ghost" style={{ padding: '5px 7px' }}><MIcon name="play"  size={12} color={M.accent} /></button>}
          {t.status === 'failed'  && <button className="mn-btn mn-btn-ghost" style={{ padding: '5px 7px', color: M.warn }}><MIcon name="refresh" size={12} /></button>}
          <button className="mn-btn mn-btn-ghost" style={{ padding: '5px 7px' }}><MIcon name="x" size={12} /></button>
        </div>
      </td>
    </tr>
  );
}

/* one-time CSS injection */
if (!document.getElementById('mono-styles')) {
  const s = document.createElement('style');
  s.id = 'mono-styles';
  s.textContent = `
    *, *::before, *::after { box-sizing: border-box; }
    .mn-mono { font-family:${M.mono}; }
    .mn-num  { font-variant-numeric: tabular-nums; }
    .mn-btn  { font-family:${M.display}; font-size:13px; font-weight:500; padding:8px 14px; border-radius:6px; border:1px solid ${M.line}; background:${M.panel}; color:${M.ink}; cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition: all .12s; }
    .mn-btn:hover { background:${M.bg2}; border-color:${M.ink2}33; }
    .mn-btn-accent { background:${M.accent}; border-color:${M.accent}; color:#fff; }
    .mn-btn-accent:hover { background:#cc4a23; border-color:#cc4a23; }
    .mn-btn-ghost { background:transparent; border-color:transparent; color:${M.inkDim}; }
    .mn-btn-ghost:hover { background:${M.bg2}; color:${M.ink}; }
    .mn-input { font-family:${M.mono}; background:${M.panel}; border:1px solid ${M.line}; color:${M.ink}; padding:8px 11px; border-radius:6px; font-size:12.5px; outline:none; }
    .mn-input:focus { border-color:${M.ink}; box-shadow: 0 0 0 3px ${M.ink}10; }
    .mn-chip { display:inline-flex; align-items:center; gap:6px; font-family:${M.mono}; font-size:10.5px; padding:3px 8px; border-radius:4px; border:1px solid ${M.line}; color:${M.inkDim}; background:${M.panel}; letter-spacing:.04em; }
    .mn-progress { height:4px; background:${M.bg2}; border-radius:0; overflow:hidden; }
    .mn-progress > div { height:100%; background:${M.ink}; transition: width .4s ease; }
    .mn-progress.idle > div { background:${M.line}; }
    .mn-progress.done > div { background:${M.ok}; }
    .mn-progress.fail > div { background:${M.red}; }
    .mn-progress.accent > div { background:${M.accent}; }
    .mn-h1 { font-family:${M.display}; font-weight:700; letter-spacing:-.025em; line-height:1; }
    .mn-h2 { font-family:${M.display}; font-weight:600; letter-spacing:-.015em; }
    .mn-row-hover { transition: background .1s; }
    .mn-row-hover:hover { background:${M.bg2}; }
    .ms-section-label { font-family:${M.mono}; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:${M.inkFaint}; }
    .ms-scroll { overflow:auto; }
    .ms-scroll::-webkit-scrollbar { width:8px; height:8px; }
    .ms-scroll::-webkit-scrollbar-thumb { background:${M.line}; border-radius:4px; }
    .ms-op { padding:14px 14px; cursor:pointer; transition:background .12s; display:flex; flex-direction:column; min-height:108px; }
    .ms-op:hover { background:${M.bg2}; }
    .ms-op-key { font-family:${M.mono}; font-size:10px; color:${M.inkFaint}; letter-spacing:.12em; }
    @keyframes ms-pulse { 0%,100% { opacity:.45 } 50% { opacity:1 } }
    .ms-pulse { animation: ms-pulse 1.4s ease-in-out infinite; }
    .ms-root { font-family:${M.display}; color:${M.ink}; background:${M.bg}; height:100%; width:100%; display:flex; flex-direction:column; overflow:hidden; }
  `;
  document.head.appendChild(s);
}

/* ============================================================
   App
   ============================================================ */
function InputPromptOverlay({ prompt, task_id, onSubmit }) {
  const [answer, setAnswer] = React.useState('y');
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999 }}>
      <div style={{ background: M.panel, padding: 24, borderRadius: 8, minWidth: 360, border: `1px solid ${M.line}` }}>
        <div className="mn-mono" style={{ fontSize: 13, marginBottom: 12, color: M.ink, whiteSpace: 'pre-wrap' }}>{prompt || '后台任务需要输入：'}</div>
        <input className="mn-input" value={answer} onChange={e => setAnswer(e.target.value)}
               onKeyDown={e => e.key === 'Enter' && onSubmit(answer)}
               style={{ width: '100%', marginBottom: 12 }} autoFocus />
        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
          <button className="mn-btn" onClick={() => onSubmit('')}>跳过</button>
          <button className="mn-btn mn-btn-accent" onClick={() => onSubmit(answer)}>确认</button>
        </div>
      </div>
    </div>
  );
}

function MonoSingleApp() {
  const [filter, setFilter] = React.useState('all');
  const [tick,   setTick]   = React.useState(0);
  const [tasks,  setTasks]  = React.useState([]);
  const [logs,   setLogs]   = React.useState([]);
  const [connected,    setConnected]    = React.useState(false);
  const [pendingInput, setPendingInput] = React.useState(null);
  const [status, setStatus] = React.useState({ mosaic_installed: false, upload_count: 0, has_api_key: false });

  React.useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 800);
    return () => clearInterval(id);
  }, []);

  React.useEffect(() => {
    const es = new EventSource('/api/stream');
    es.addEventListener('task_update', e => {
      const t = JSON.parse(e.data);
      setTasks(prev => {
        const idx = prev.findIndex(x => x.id === t.id);
        if (idx >= 0) { const n = [...prev]; n[idx] = t; return n; }
        return [...prev, t];
      });
    });
    es.addEventListener('log', e => { setLogs(prev => [...prev.slice(-499), JSON.parse(e.data)]); });
    es.addEventListener('input_required', e => setPendingInput(JSON.parse(e.data)));
    es.onopen  = () => setConnected(true);
    es.onerror = () => setConnected(false);
    return () => es.close();
  }, []);

  React.useEffect(() => {
    fetch('/api/status').then(r => r.json()).then(setStatus).catch(() => {});
  }, []);

  const runCmd = (cmd, params = {}) =>
    fetch(`/api/run/${cmd}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(params) });

  const replyInput = (taskId, answer) => {
    fetch(`/api/tasks/${taskId}/resume`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ answer }) });
    setPendingInput(null);
  };

  const runningCount = tasks.filter(t => t.status === 'running').length;

  return (
    <div className="ms-root">
      {pendingInput && <InputPromptOverlay {...pendingInput} onSubmit={ans => replyInput(pendingInput.task_id, ans)} />}
      <header style={{ padding: '14px 24px', borderBottom: `1px solid ${M.line}`, display: 'flex', alignItems: 'center', gap: 18, background: M.panel, flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 28, height: 28, borderRadius: 5, background: M.ink, display: 'grid', placeItems: 'center' }}>
            <span className="mn-mono" style={{ fontSize: 11, fontWeight: 700, color: '#fff' }}>cp</span>
          </div>
          <div style={{ lineHeight: 1.15 }}>
            <div style={{ fontSize: 13.5, fontWeight: 600 }}>Civitai · Pixiv Uploader</div>
            <div className="mn-mono" style={{ fontSize: 10, color: M.inkFaint }}>single-page console</div>
          </div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 10, alignItems: 'center' }}>
          <span className="mn-chip">
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: status.mosaic_installed ? M.ok : M.inkFaint }} />
            R-18 mosaic {status.mosaic_installed ? 'ON' : 'OFF'}
          </span>
          <span className="mn-chip">upload/ {status.upload_count} imgs</span>
        </div>
      </header>

      <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 380px', gap: 0, minHeight: 0 }}>
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: 0, borderRight: `1px solid ${M.line}` }}>
          <ActiveHero tick={tick} tasks={tasks} />
          <OperationsStrip runCmd={runCmd} />
          <QueueZone filter={filter} setFilter={setFilter} tasks={tasks} />
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: 0 }}>
          <LogZone logs={logs} />
          <SettingsZone status={status} />
        </div>
      </div>

      <div style={{ height: 26, borderTop: `1px solid ${M.line}`, background: M.panel, display: 'flex', alignItems: 'center', padding: '0 18px', fontSize: 11, fontFamily: M.mono, color: M.inkFaint, gap: 16, flexShrink: 0 }}>
        <span style={{ color: connected ? M.ok : M.red }}>● {connected ? 'connected' : 'disconnected'}</span>
        <span style={{ marginLeft: 'auto', color: runningCount > 0 ? M.accent : M.inkFaint, fontWeight: runningCount > 0 ? 600 : 400 }}>
          {runningCount} {runningCount === 1 ? 'job' : 'jobs'} running
        </span>
      </div>
    </div>
  );
}

function ActiveHero({ tick, tasks }) {
  const active = tasks.find(t => t.status === 'running');
  const civPct = active ? active.progress * 100 : 0;
  const pxvPct = active ? Math.max(0, active.progress * 100 - 5 + (tick % 4) * 0.3) : 0;
  if (!active) {
    return (
      <div style={{ padding: '20px 24px 18px', borderBottom: `1px solid ${M.line}`, background: M.panel }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}><span className="ms-section-label">active job</span></div>
        <div style={{ fontSize: 14, color: M.inkDim }}>No job running. Use the operations below to start one.</div>
      </div>
    );
  }
  return (
    <div style={{ padding: '20px 24px 18px', borderBottom: `1px solid ${M.line}`, background: M.panel }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 24 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <span className="mn-mono ms-pulse" style={{ fontSize: 10, color: M.accent, fontWeight: 600, letterSpacing: '.12em', display: 'inline-flex', alignItems: 'center', gap: 5 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: M.accent }} /> LIVE
            </span>
            <span className="ms-section-label">active job</span>
          </div>
          <div className="mn-h1" style={{ fontSize: 28, marginBottom: 4 }}>{active.title}</div>
          <div style={{ fontSize: 13, color: M.inkDim, marginBottom: 14 }}>{active.target} · {active.count} · ETA {active.eta}</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
            <MonoChannel label="Civitai" pct={civPct} accent />
            <MonoChannel label="Pixiv"   pct={pxvPct} />
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, flexShrink: 0, paddingLeft: 18, borderLeft: `1px solid ${M.line}` }}>
          <button className="mn-btn" onClick={() => fetch(`/api/tasks/${active.id}/cancel`, { method: 'POST' })}>
            <MIcon name="stop" size={12} /> Cancel
          </button>
          <button className="mn-btn mn-btn-ghost"><MIcon name="folder" size={13} /> Folder</button>
        </div>
      </div>
    </div>
  );
}

function OperationsStrip({ runCmd }) {
  const ops = [
    { key: '1', icon: 'split',   title: 'Split post',  sub: '一帖多图 → 多帖单图', cmd: 1 },
    { key: '2', icon: 'upload',  title: 'Dual upload', sub: 'Civitai + Pixiv',    cmd: 2 },
    { key: '3', icon: 'image',   title: 'Pixiv only',  sub: '跳过 Civitai',       cmd: 3 },
    { key: '4', icon: 'shield',  title: 'R-18 mosaic', sub: '安装 / 检查',        cmd: 4 },
    { key: '5', icon: 'refresh', title: 'Update',      sub: '检查更新',           cmd: 5 },
  ];
  return (
    <div style={{ borderBottom: `1px solid ${M.line}`, background: M.bg }}>
      <div style={{ padding: '12px 24px 8px', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
        <span className="ms-section-label">operations</span>
        <span className="mn-mono" style={{ fontSize: 10, color: M.inkFaint }}>press 1–5 · or click</span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', borderTop: `1px solid ${M.line}` }}>
        {ops.map((o, i) => (
          <div key={o.key} className="ms-op" onClick={() => runCmd(o.cmd)}
               style={{ borderRight: i < ops.length - 1 ? `1px solid ${M.line}` : 'none' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span className="ms-op-key">[{o.key}]</span>
              <MIcon name={o.icon} size={16} color={M.ink2} />
            </div>
            <div style={{ marginTop: 'auto' }}>
              <div className="mn-h2" style={{ fontSize: 14, marginBottom: 2 }}>{o.title}</div>
              <div style={{ fontSize: 11.5, color: M.inkDim, lineHeight: 1.4 }}>{o.sub}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function QueueZone({ filter, setFilter, tasks }) {
  const running = tasks.filter(t => t.status === 'running').length;
  const queued  = tasks.filter(t => t.status === 'queued').length;
  const done    = tasks.filter(t => t.status === 'done').length;
  const failed  = tasks.filter(t => t.status === 'failed').length;
  const filters = [
    { id: 'all',     label: 'All',     n: tasks.length },
    { id: 'running', label: 'Running', n: running },
    { id: 'queued',  label: 'Queued',  n: queued  },
    { id: 'done',    label: 'Done',    n: done    },
    { id: 'failed',  label: 'Failed',  n: failed  },
  ];
  const list = filter === 'all' ? tasks : tasks.filter(t => t.status === filter);
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0, background: M.panel }}>
      <div style={{ padding: '10px 24px 0', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 14 }}>
          <span className="ms-section-label">queue</span>
          <div style={{ display: 'flex', gap: 0 }}>
            {filters.map(f => {
              const active = filter === f.id;
              return (
                <button key={f.id} onClick={() => setFilter(f.id)} className="mn-btn mn-btn-ghost"
                  style={{ borderRadius: 0, padding: '6px 10px', fontSize: 12, color: active ? M.ink : M.inkDim, fontWeight: active ? 600 : 500, boxShadow: active ? `inset 0 -2px 0 ${M.accent}` : 'none', background: 'transparent' }}>
                  {f.label} <span className="mn-mono mn-num" style={{ fontSize: 10, color: M.inkFaint, marginLeft: 3 }}>{f.n}</span>
                </button>
              );
            })}
          </div>
        </div>
        <button className="mn-btn mn-btn-ghost" style={{ padding: '4px 8px', fontSize: 12 }}><MIcon name="refresh" size={12} /></button>
      </div>
      <div className="ms-scroll" style={{ flex: 1, padding: '4px 0 8px' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              {[{ h: '', w: 56 }, { h: 'Task' }, { h: 'Target', w: 110 }, { h: 'Progress', w: 140 }, { h: 'Imgs', w: 70 }, { h: 'ETA', w: 56 }, { h: '', w: 88 }].map((c, i) => (
                <th key={i} style={{ width: c.w, textAlign: 'left', fontSize: 9.5, fontFamily: M.mono, fontWeight: 500, color: M.inkFaint, letterSpacing: '.1em', textTransform: 'uppercase', padding: '8px 12px', borderBottom: `1px solid ${M.line}` }}>{c.h}</th>
              ))}
            </tr>
          </thead>
          <tbody>{list.map(t => <MonoTaskRow key={t.id} t={t} />)}</tbody>
        </table>
        {list.length === 0 && <div style={{ padding: '24px', textAlign: 'center', color: M.inkFaint, fontFamily: M.mono, fontSize: 12 }}>No tasks yet. Click an operation above to start.</div>}
      </div>
    </div>
  );
}

function LogZone({ logs }) {
  const [grep, setGrep]   = React.useState('');
  const [paused, setPaused] = React.useState(false);
  const endRef = React.useRef(null);
  const lvlColor = { INFO: M.ink, OK: M.ok, WARN: M.warn, ERR: M.red };
  React.useEffect(() => {
    if (!paused && endRef.current) endRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [logs, paused]);
  const filtered = grep ? logs.filter(l => l.msg.toLowerCase().includes(grep.toLowerCase()) || l.src.toLowerCase().includes(grep.toLowerCase())) : logs;
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0, background: M.panel, borderBottom: `1px solid ${M.line}` }}>
      <div style={{ padding: '10px 18px 8px', display: 'flex', alignItems: 'center', gap: 10, borderBottom: `1px solid ${M.lineSoft}` }}>
        <span className="ms-section-label">log</span>
        <span className="mn-chip" style={{ fontSize: 9.5 }}><span className="ms-pulse" style={{ width: 5, height: 5, borderRadius: '50%', background: M.accent }} /> live</span>
        <input className="mn-input" placeholder="grep" value={grep} onChange={e => setGrep(e.target.value)} style={{ flex: 1, padding: '4px 8px', fontSize: 11.5 }} />
        <button className="mn-btn mn-btn-ghost" style={{ padding: '4px 6px' }} onClick={() => setPaused(p => !p)}><MIcon name={paused ? 'play' : 'pause'} size={12} /></button>
      </div>
      <div className="ms-scroll" style={{ flex: 1, padding: '6px 0', background: M.panel, fontFamily: M.mono, fontSize: 11, lineHeight: 1.55 }}>
        {filtered.map((l, i) => (
          <div key={i} className="mn-row-hover" style={{ padding: '1px 14px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
            <span style={{ color: M.inkFaint }}>{l.t.slice(3, 12)}</span>
            {' '}<span style={{ color: lvlColor[l.lvl] || M.ink, fontWeight: 600 }}>{(l.lvl || 'INFO').padEnd(4)}</span>
            {' '}<span style={{ color: M.accent }}>{l.src}</span>
            {' '}<span style={{ color: M.ink2 }}>{l.msg}</span>
          </div>
        ))}
        <div ref={endRef} style={{ padding: '6px 14px', color: M.accent }}>{'> '}<span className="ms-pulse">▮</span></div>
      </div>
    </div>
  );
}

function SettingsZone({ status }) {
  return (
    <div style={{ background: M.panel, padding: '12px 18px 14px', flexShrink: 0 }}>
      <div className="ms-section-label" style={{ marginBottom: 8 }}>settings</div>
      <SetCompactRow label="Mosaic model" value={status.mosaic_installed ? 'installed' : 'not installed'} ok={status.mosaic_installed} />
      <SetCompactRow label="Upload queue" value={`${status.upload_count} imgs`} />
      <SetCompactRow label="API key"      value={status.has_api_key ? 'set via env' : 'not set'} ok={status.has_api_key} last />
    </div>
  );
}
function SetCompactRow({ label, value, ok, last }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', padding: '7px 0', borderBottom: last ? 'none' : `1px solid ${M.lineSoft}` }}>
      <div style={{ fontSize: 12.5 }}>{label}</div>
      <div style={{ marginLeft: 'auto', display: 'flex', gap: 7, alignItems: 'center' }}>
        {ok !== undefined && <span style={{ width: 6, height: 6, borderRadius: '50%', background: ok ? M.ok : M.red }} />}
        <span className="mn-mono" style={{ fontSize: 11.5, color: M.inkDim }}>{value}</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MonoSingleApp />);
</script>
</body>
</html>
